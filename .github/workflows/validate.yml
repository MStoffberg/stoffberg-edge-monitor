name: validate
on:
  push:
  pull_request:

jobs:
  validate-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell syntax check
        run: |
          for f in install.sh scripts/*.sh; do
            echo "checking $f"
            sh -n "$f"
          done
      - name: Check no obvious committed secrets
        run: |
          if grep -RInE 'ghp_|gho_|github_pat_|BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY' . --exclude-dir=.git --exclude='validate.yml'; then
            echo 'Potential secret material found' >&2
            exit 1
          fi
